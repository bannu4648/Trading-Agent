name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      cloudflare_url: ${{ steps.export_url.outputs.cloudflare_url }}

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"

            # Pull latest code
            cd ~/Trading-Agent
            git pull origin main
            uv sync

            # Kill all stale backend screen sessions
            screen -ls | grep backend | awk '{print $1}' | xargs -I{} screen -S {} -X quit || true
            sleep 1

            # Kill all stale cloudflare screen sessions
            screen -ls | grep cloudflare | awk '{print $1}' | xargs -I{} screen -S {} -X quit || true
            sleep 1

            # Start backend
            screen -dmS backend bash -c "export PATH=$HOME/.local/bin:$PATH && cd ~/Trading-Agent && set -a && source .env && set +a && uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 >> ~/backend.log 2>&1"

            # Start Cloudflare tunnel
            > ~/cloudflare.log
            screen -dmS cloudflare bash -c "cloudflared tunnel --url http://localhost:8000 >> ~/cloudflare.log 2>&1"

            # Wait for Cloudflare URL to appear
            sleep 8
            CLOUDFLARE_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' ~/cloudflare.log || echo "")
            echo "✅ Backend redeployed at $(date)"
            echo "🌐 Cloudflare URL: $CLOUDFLARE_URL"
            echo "$CLOUDFLARE_URL" > ~/cloudflare_url.txt

      - name: Setup SSH key for runner
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Export Cloudflare URL as output
        id: export_url
        run: |
          CF_URL=$(ssh -i ~/.ssh/ec2_key ec2-user@${{ secrets.EC2_HOST }} "cat ~/cloudflare_url.txt")
          echo "cloudflare_url=$CF_URL" >> $GITHUB_OUTPUT
          echo "Captured URL: $CF_URL"

  update-frontend:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Update VITE_API_BASE on Render
        run: |
          CLOUDFLARE_URL="${{ needs.deploy.outputs.cloudflare_url }}"
          echo "Updating Render with URL: $CLOUDFLARE_URL"
          curl -s -X PUT "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/env-vars" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "[{\"key\": \"VITE_API_BASE\", \"value\": \"$CLOUDFLARE_URL\"}]"

      - name: Trigger Render Frontend Redeploy
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"
          echo "✅ Render frontend redeploy triggered"
