name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/Trading-Agent
            git pull origin main
            source $HOME/.local/bin/env
            uv sync
            screen -S backend -X quit || true
            sleep 1
            screen -dmS backend bash -c "cd ~/Trading-Agent && uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 >> ~/backend.log 2>&1"
            echo "✅ Backend redeployed at $(date)"
